# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "6b6a2a30543f747e0120cd9e0f36f17f"
name = "ai-stylist"
application_url = "https://web-production-3b1d7.up.railway.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/data-request"
  compliance_topics = [ "customers/data_request" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/redact"
  compliance_topics = [ "customers/redact" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/shop/redact"
  compliance_topics = [ "shop/redact" ]

  [[webhooks.subscriptions]]
  topics = [ "products/create" ]
  uri = "/webhooks/products/create"

  [[webhooks.subscriptions]]
  topics = [ "products/update" ]
  uri = "/webhooks/products/update"

  [[webhooks.subscriptions]]
  topics = [ "products/delete" ]
  uri = "/webhooks/products/delete"

  [[webhooks.subscriptions]]
  topics = [ "inventory_levels/update" ]
  uri = "/webhooks/inventory_levels/update"

  # Phase 1 PR-C: catalog DELTA enqueueing on collection changes.
  [[webhooks.subscriptions]]
  topics = [ "collections/create" ]
  uri = "/webhooks/collections/create"

  [[webhooks.subscriptions]]
  topics = [ "collections/update" ]
  uri = "/webhooks/collections/update"

  [[webhooks.subscriptions]]
  topics = [ "collections/delete" ]
  uri = "/webhooks/collections/delete"

  # Phase 1 PR-C deferrals (NOT subscribed here):
  # - customers/{create,update,delete} and orders/{create,updated,cancelled}
  #   require Shopify's protected customer data approval. Application is in
  #   review; a future small PR re-adds these subscriptions + real handlers
  #   once approved. PR-D's daily DELTA cron is the catch-up path until
  #   then.
  # - metaobjects/{create,update,delete} require a metaobject_type filter
  #   in shopify.app.toml's declarative form. The dev shop has zero
  #   metaobject definitions today (verified during PR-B), so subscribing
  #   would be vacuous. PR-D's cron catches metaobject changes; if a
  #   future merchant has live metaobject definitions and cron lag is
  #   unacceptable, a follow-up PR can register per-type subscriptions
  #   dynamically via Shopify Admin API instead of toml.

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
#
# Phase 1 PR-B: scope set pulled forward from PR-C so the worker's
# METAOBJECTS phase + PR-C's webhook handlers can both read what they
# need without forcing the merchant to re-authorize twice. Per scope:
#   read_products                — explicit even though write_products
#                                  implies read in most contexts; avoids
#                                  edge-case GraphQL field-level rejects
#   write_products               — product mutations (existing)
#   read_inventory               — variant inventory state (existing)
#   read_metaobjects             — METAOBJECTS phase reads instances
#   read_metaobject_definitions  — METAOBJECTS phase enumerates types
#   read_customers               — PR-C customers/* webhook handlers
#   write_customers              — PR-C customer profile writes
#   read_orders                  — PR-C orders/* webhook handlers (plus
#                                  Phase 3 attribution reconciliation)
scopes = "read_products,write_products,read_inventory,read_metaobjects,read_metaobject_definitions,read_customers,write_customers,read_orders"

[auth]
redirect_urls = [ "https://web-production-3b1d7.up.railway.app/auth/callback" ]
