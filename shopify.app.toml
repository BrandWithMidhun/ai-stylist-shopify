# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "6b6a2a30543f747e0120cd9e0f36f17f"
name = "ai-stylist"
application_url = "https://web-production-3b1d7.up.railway.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/data-request"
  compliance_topics = [ "customers/data_request" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/redact"
  compliance_topics = [ "customers/redact" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/shop/redact"
  compliance_topics = [ "shop/redact" ]

  [[webhooks.subscriptions]]
  topics = [ "products/create" ]
  uri = "/webhooks/products/create"

  [[webhooks.subscriptions]]
  topics = [ "products/update" ]
  uri = "/webhooks/products/update"

  [[webhooks.subscriptions]]
  topics = [ "products/delete" ]
  uri = "/webhooks/products/delete"

  [[webhooks.subscriptions]]
  topics = [ "inventory_levels/update" ]
  uri = "/webhooks/inventory_levels/update"

  # Phase 1 PR-C: catalog DELTA enqueueing on collection changes.
  [[webhooks.subscriptions]]
  topics = [ "collections/create" ]
  uri = "/webhooks/collections/create"

  [[webhooks.subscriptions]]
  topics = [ "collections/update" ]
  uri = "/webhooks/collections/update"

  [[webhooks.subscriptions]]
  topics = [ "collections/delete" ]
  uri = "/webhooks/collections/delete"

  # Phase 1 PR-C: customer lifecycle. Log-only stubs in PR-C; PR-D wires
  # the real CustomerProfile schema + write path. Subscribing now so we
  # don't lose deliveries between PR-C deploy and PR-D ship. Originally
  # deferred when the dev app lacked Shopify protected customer data
  # access; restored after dev-mode access was activated 2026-04-30.
  [[webhooks.subscriptions]]
  topics = [ "customers/create" ]
  uri = "/webhooks/customers/create"

  [[webhooks.subscriptions]]
  topics = [ "customers/update" ]
  uri = "/webhooks/customers/update"

  [[webhooks.subscriptions]]
  topics = [ "customers/delete" ]
  uri = "/webhooks/customers/delete"

  # Phase 1 PR-C: order lifecycle. Log-only stubs in PR-C; Phase 3 builds
  # the order ingest pipeline + AI revenue attribution against these.
  # Originally deferred with customers/*; restored after protected
  # customer data dev-mode access activated 2026-04-30.
  [[webhooks.subscriptions]]
  topics = [ "orders/create" ]
  uri = "/webhooks/orders/create"

  [[webhooks.subscriptions]]
  topics = [ "orders/updated" ]
  uri = "/webhooks/orders/updated"

  [[webhooks.subscriptions]]
  topics = [ "orders/cancelled" ]
  uri = "/webhooks/orders/cancelled"

  # metaobjects subscriptions deferred — Shopify requires metaobject_type
  # filter and dev shop has zero metaobject definitions. Revisit when
  # onboarding a merchant with metaobject definitions. Skeleton handlers
  # remain in app/routes/webhooks.metaobjects.{create,update,delete}.tsx
  # so wiring real subscriptions later is a toml-only change.

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
#
# Phase 1 PR-B: scope set pulled forward from PR-C so the worker's
# METAOBJECTS phase + PR-C's webhook handlers can both read what they
# need without forcing the merchant to re-authorize twice. Per scope:
#   read_products                — explicit even though write_products
#                                  implies read in most contexts; avoids
#                                  edge-case GraphQL field-level rejects
#   write_products               — product mutations (existing)
#   read_inventory               — variant inventory state (existing)
#   read_metaobjects             — METAOBJECTS phase reads instances
#   read_metaobject_definitions  — METAOBJECTS phase enumerates types
#   read_customers               — PR-C customers/* webhook handlers
#   write_customers              — PR-C customer profile writes
#   read_orders                  — PR-C orders/* webhook handlers (plus
#                                  Phase 3 attribution reconciliation)
scopes = "read_products,write_products,read_inventory,read_metaobjects,read_metaobject_definitions,read_customers,write_customers,read_orders"

[auth]
redirect_urls = [ "https://web-production-3b1d7.up.railway.app/auth/callback" ]
